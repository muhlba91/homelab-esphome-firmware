---
name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Firmware
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        python-version: ["3.9"]

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: mdgreenwald/mozilla-sops-action@bb2d96a13ef438ad122e5827a57ebd75d6ff118d # v2.1.0

      - uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        id: import-secrets
        with:
          method: jwt
          url: ${{ secrets.VAULT_ADDR }}
          path: ${{ secrets.VAULT_PATH }}
          role: ${{ secrets.VAULT_ROLE }}
          secrets: |
            github-homelab-esphome-firmware/data/scaleway organization_id | SCW_ORGANIZATION_ID ;
            github-homelab-esphome-firmware/data/scaleway project_id | SCW_PROJECT_ID ;
            github-homelab-esphome-firmware/data/scaleway region | SCW_DEFAULT_REGION ;
            github-homelab-esphome-firmware/data/scaleway zone | SCW_DEFAULT_ZONE ;
            github-homelab-esphome-firmware/data/scaleway access_key | SCW_ACCESS_KEY ;
            github-homelab-esphome-firmware/data/scaleway secret_key | SCW_SECRET_KEY

      - run: |
          pip install s3cmd --no-cache

      - run: |
          ./scripts/secrets_crypter.sh d

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          tags: builder:latest
          push: false
      - uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185 # v3
        with:
          image: builder:latest
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            ./scripts/build_firmware.sh

      - run: |
          ./scripts/upload_firmware.sh infrastructure-assets-5274ba70-fde0-47de-8e9a-f1bc64c11157/esphome/firmware
